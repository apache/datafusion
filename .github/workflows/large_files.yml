name: Large files PR check

concurrency:
  group: ${{ github.repository }}-${{ github.head_ref || github.sha }}-${{ github.workflow }}
  cancel-in-progress: true

on:
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:

  check-semver:
    name: Check semver
    runs-on: ubuntu-latest
    outputs:
      logs: ${{ steps.check_semver.outputs.logs }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks

      - name: Run cargo-semver-checks
        id: check_semver
        run: |
          set +e
          cargo semver-checks --baseline-rev origin/main 2>&1 | tee /tmp/semver-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          OUTPUT=$(sed 's/\x1b\[[0-9;]*m//g' /tmp/semver-output.txt)
          echo "logs<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE

  comment-on-pr:
    name: Comment on pull request
    runs-on: ubuntu-latest
    needs: check-semver
    if: always()
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Comment
        if: ${{ needs.check-semver.result != 'success' }}
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-semver-check-error
          message: |
            Thank you for opening this pull request!

            Reviewer note: [cargo-semver-checks](https://github.com/obi1kenobi/cargo-semver-checks) reported the current version number is not SemVer-compatible with the changes made since the last release.

            Details:

            ```
            ${{ needs.check-semver.outputs.logs }}
            ```

      - name: Delete comment
        if: ${{ needs.check-semver.result == 'success' }}
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-semver-check-error
          delete: true

  check-files:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - name: Check size of new Git objects
        env:
          # 1 MB ought to be enough for anybody.
          # TODO in case we may want to consciously commit a bigger file to the repo without using Git LFS we may disable the check e.g. with a label
          MAX_FILE_SIZE_BYTES: 1048576
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "merge_group" ]; then
            # For merge queue, compare against the base branch
            base_sha="${{ github.event.merge_group.base_sha }}"
            head_sha="${{ github.event.merge_group.head_sha }}"
          else
            # For pull requests
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          fi
          git rev-list --objects ${base_sha}..${head_sha} \
            > pull-request-objects.txt
          exit_code=0
          while read -r id path; do
            # Skip objects which are not files (commits, trees)
            if [ ! -z "${path}" ]; then
              size="$(git cat-file -s "${id}")"
              if [ "${size}" -gt "${MAX_FILE_SIZE_BYTES}" ]; then
                exit_code=1
                echo "Object ${id} [${path}] has size ${size}, exceeding ${MAX_FILE_SIZE_BYTES} limit." >&2
                echo "::error file=${path}::File ${path} has size ${size}, exceeding ${MAX_FILE_SIZE_BYTES} limit."
              fi
            fi
          done < pull-request-objects.txt
          exit "${exit_code}"
