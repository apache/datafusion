    decomposable: MANY
    deterministic: true
    intermediate: i64
    nullability: MIRROR
    ordered: false
    return: u64
    sessionDependent: false
  name: regr_count
- description: Computes the y-intercept of the linear regression line. For the equation (y = kx + b), this function returns b.
  impls:
  - args:
    - name: expression_y
      value: fp64
    - name: expression_x
      value: fp64
    decomposable: MANY
    deterministic: true
    intermediate: fp64
    nullability: MIRROR
    ordered: false
    return: fp64
    sessionDependent: false
  name: regr_intercept
- description: Computes the square of the correlation coefficient between the independent and dependent variables.
  impls:
  - args:
    - name: expression_y
      value: fp64
    - name: expression_x
      value: fp64
    decomposable: MANY
    deterministic: true
    intermediate: fp64
    nullability: MIRROR
    ordered: false
    return: fp64
    sessionDependent: false
  name: regr_r2
- description: 'Returns the slope of the linear regression line for non-null pairs in aggregate columns. Given input column Y and X: regr_slope(Y, X) returns the slope (k in Y = k*X + b) using minimal RSS fitting.'
  impls:
  - args:
    - name: expression_y
      value: fp64
    - name: expression_x
      value: fp64
    decomposable: MANY
    deterministic: true
    intermediate: fp64
    nullability: MIRROR
    ordered: false
    return: fp64
    sessionDependent: false
  name: regr_slope
- description: Computes the sum of squares of the independent variable.
