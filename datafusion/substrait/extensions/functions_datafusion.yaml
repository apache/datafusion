      value: integer
    decomposable: MANY
    deterministic: true
    intermediate: any
    nullability: MIRROR
    ordered: false
    return: any
    sessionDependent: false
  name: bit_or
- description: Computes the bitwise exclusive OR of all non-null input values.
  impls:
