    decomposable: MANY
    deterministic: true
    intermediate: any
    nullability: MIRROR
    ordered: false
    return: any
    sessionDependent: false
  name: bit_xor
- description: Returns true if all non-null input values are true, otherwise false.
  impls:
  - args:
    - name: expression
      value: boolean
    decomposable: MANY
    deterministic: true
    intermediate: boolean
    nullability: MIRROR
    ordered: false
    return: boolean
    sessionDependent: false
  name: bool_and
- description: Returns true if all non-null input values are true, otherwise false.
  impls:
  - args:
    - name: expression
      value: boolean
    decomposable: MANY
    deterministic: true
    intermediate: boolean
    nullability: MIRROR
    ordered: false
    return: boolean
    sessionDependent: false
  name: bool_or
- description: Returns the coefficient of correlation between two numeric values.
  impls:
  - args:
    - name: y
      value: fp64
    - name: x
      value: fp64
    decomposable: MANY
    deterministic: true
    intermediate: fp64
    nullability: MIRROR
    ordered: false
    return: fp64
    sessionDependent: false
  name: corr
- description: Returns the number of non-null values in the specified column. To include null values in the total count, use `count(*)`.
  impls:
  - args:
    - name: expression
      value: any
    decomposable: MANY
    deterministic: true
    intermediate: i64
    nullability: DECLARED_OUTPUT
    ordered: false
    return: any
    sessionDependent: false
    variadic:
      min: 1.0
      parameterConsistency: INCONSISTENT
  - decomposable: MANY
    deterministic: true
    intermediate: i64
    nullability: DECLARED_OUTPUT
    ordered: false
    return: i64
    sessionDependent: false
  name: count
- description: Returns the sample covariance of a set of number pairs.
  impls:
  - args:
    - name: expression1
      value: fp64
    - name: expression2
      value: fp64
    decomposable: MANY
    deterministic: true
    intermediate: fp64
    nullability: MIRROR
    ordered: false
    return: fp64
    sessionDependent: false
  name: covar_pop
- description: Returns the sample covariance of a set of number pairs.
  impls:
  - args:
    - name: expression1
      value: fp64
    - name: expression2
      value: fp64
    decomposable: MANY
    deterministic: true
    intermediate: fp64
    nullability: MIRROR
    ordered: false
    return: fp64
    sessionDependent: false
  metadata:
    datafusion:
      aliases:
      - covar
  name: covar_samp
- description: Returns the first element in an aggregation group according to the requested ordering. If no ordering is given, returns an arbitrary element from the group.
  impls:
  - args:
    - name: expression
      value: any
    decomposable: MANY
    deterministic: true
    intermediate: any
    nullability: MIRROR
    ordered: false
    return: any
    sessionDependent: false
  name: first_value
- description: Returns 1 if the data is aggregated across the specified column, or 0 if it is not aggregated in the result set.
  impls:
  - args:
    - name: expression
      value: any
    decomposable: MANY
    deterministic: true
    intermediate: any
    nullability: MIRROR
    ordered: false
    return: any
    sessionDependent: false
    variadic:
      min: 1.0
      parameterConsistency: INCONSISTENT
  name: grouping
- description: Returns the last element in an aggregation group according to the requested ordering. If no ordering is given, returns an arbitrary element from the group.
  impls:
  - args:
    - name: expression
      value: any
    decomposable: MANY
    deterministic: true
    intermediate: any
    nullability: MIRROR
    ordered: false
    return: any
    sessionDependent: false
  name: last_value
- description: Returns the maximum value in the specified column.
  impls:
  - args:
    - name: expression
      value: any1
    decomposable: MANY
    deterministic: true
    intermediate: any1
    nullability: MIRROR
    ordered: false
    return: any1
    sessionDependent: false
  name: max
- description: Returns the median value in the specified column.
  impls:
  - args:
    - name: expression
      value: decimal
    decomposable: NONE
    deterministic: true
    intermediate: any
    nullability: MIRROR
    ordered: false
    return: any
