aggregate_functions:
- description: Returns the approximate number of distinct input values calculated using the HyperLogLog algorithm.
  impls:
  - args:
    - name: expression
      value: any
    decomposable: MANY
    deterministic: true
    intermediate: i64
    nullability: MIRROR
    ordered: false
    return: any
    sessionDependent: false
  name: approx_distinct
- description: Returns the approximate median (50th percentile) of input values. It is an alias of `approx_percentile_cont(0.5) WITHIN GROUP (ORDER BY x)`.
  impls:
  - args:
    - name: expression
      value: float
    decomposable: NONE
    deterministic: true
    intermediate: any
    nullability: MIRROR
    ordered: false
    return: any
    sessionDependent: false
  name: approx_median
- description: Returns the approximate percentile of input values using the t-digest algorithm.
  impls:
  - args:
    - name: expression
      value: float
    - name: percentile
      value: fp64
    decomposable: NONE
    deterministic: true
    intermediate: any
    nullability: MIRROR
    ordered: false
    return: any
    sessionDependent: false
  - args:
    - name: expression
      value: float
    - name: percentile
      value: fp64
    - name: centroids
      value: integer
    decomposable: NONE
    deterministic: true
    intermediate: any
    nullability: MIRROR
    ordered: false
    return: any
    sessionDependent: false
  name: approx_percentile_cont
- description: Returns the weighted approximate percentile of input values using the t-digest algorithm.
  impls:
  - args:
    - name: expression
      value: float
    - name: weight
      value: float
    - name: percentile
      value: fp64
    decomposable: NONE
    deterministic: true
    intermediate: any
    nullability: MIRROR
    ordered: false
    return: any
    sessionDependent: false
  - args:
    - name: expression
      value: float
    - name: weight
      value: float
    - name: percentile
      value: fp64
    - name: centroids
      value: integer
    decomposable: NONE
    deterministic: true
    intermediate: any
    nullability: MIRROR
    ordered: false
    return: any
    sessionDependent: false
  name: approx_percentile_cont_with_weight
- description: |-
    Returns an array created from the expression elements. If ordering is required, elements are inserted in the specified order.
    This aggregation function can only mix DISTINCT and ORDER BY if the ordering expression is exactly the same as the argument expression.
  impls:
  - args:
    - name: expression
      value: any
    decomposable: MANY
    deterministic: true
    intermediate: any
    nullability: MIRROR
    ordered: false
    return: any
    sessionDependent: false
  name: array_agg
- description: Returns the average of numeric values in the specified column.
  impls:
  - args:
    - name: expression
      value: decimal
    decomposable: MANY
    deterministic: true
    intermediate: any
    nullability: MIRROR
    ordered: false
    return: any
    sessionDependent: false
  - args:
    - name: expression
      value: duration
    decomposable: MANY
    deterministic: true
    intermediate: any
    nullability: MIRROR
    ordered: false
    return: any
    sessionDependent: false
  - args:
    - name: expression
      value: fp64
    decomposable: MANY
    deterministic: true
    intermediate: any
    nullability: MIRROR
    ordered: false
    return: any
    sessionDependent: false
  metadata:
    datafusion:
      aliases:
      - mean
  name: avg
- description: Computes the bitwise AND of all non-null input values.
  impls:
