    decomposable: MANY
    deterministic: true
    intermediate: fp64
    nullability: MIRROR
    ordered: false
    return: fp64
    sessionDependent: false
  name: regr_avgx
- description: Computes the average of the dependent variable (output) expression_y for the non-null paired data points.
